version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "sunday"
      time: "10:00"
      timezone: "UTC"

    open-pull-requests-limit: 1
    rebase-strategy: "auto"

    labels:
      - "dependencies"
      - "github_actions"
      - "security"

    groups:
      gha-security:
        patterns:
          - "*"
        update-types:
          - "security"

      gha-patch-minor:
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"