name: GitOps - Update DEV (by tag + digest)

on:
  repository_dispatch:
    types: [update-dev]   # Expects client_payload: { "tag": "...", "digest": "sha256:..." }
  workflow_dispatch:
    inputs:
      tag:
        description: "DEV image tag (e.g., dev-<sha7>)"
        required: true
        type: string
      digest:
        description: "Manifest digest (sha256:<...>)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

env:
  DEV_FILE: environments/dev/values.yaml
  BR_PREFIX: chore/dev-image-

jobs:
  update-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve inputs
        id: meta
        shell: bash
        run: |
          # Support both repository_dispatch and manual execution (workflow_dispatch).
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TAG="${{ github.event.client_payload.tag }}"
            DIGEST="${{ github.event.client_payload.digest }}"
          else
            TAG="${{ inputs.tag }}"
            DIGEST="${{ inputs.digest }}"
          fi

          # Trim leading/trailing whitespace (including newlines)
          TAG="$(echo "$TAG" | xargs)"
          DIGEST="$(echo "$DIGEST" | xargs)"

          echo "Got TAG='$TAG'"
          echo "Got DIGEST='$DIGEST'"

          # Basic validation of tag (must exist, e.g. dev-<sha7>)
          if [[ -z "$TAG" ]]; then
            echo "ERROR: tag is required" >&2
            exit 1
          fi

          # Strict validation of digest format: sha256:<64 hex characters>
          if ! [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "ERROR: digest must be like sha256:<hash> (got '$DIGEST')" >&2
            exit 1
          fi

          # Export values to next steps
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "DIGEST=$DIGEST" >> $GITHUB_OUTPUT
          echo "SHORT=${DIGEST:7:12}" >> $GITHUB_OUTPUT

      - name: Checkout GitOps repo
        uses: actions/checkout@v6

      - name: Create branch and update DEV values
        id: apply
        shell: bash
        run: |
          set -euo pipefail

          # Make branch name unique per digest (avoids "push rejected (fetch first)" on rerun)
          BR="${{ env.BR_PREFIX }}${{ steps.meta.outputs.TAG }}-${{ steps.meta.outputs.SHORT }}"
          git switch -c "$BR"

          # Export branch name for later steps
          echo "BR=$BR" >> "$GITHUB_OUTPUT"

          # Update image tag in DEV values
          sed -i -E \
            -e 's|^([[:space:]]*tag:).*|\1 '"${{ steps.meta.outputs.TAG }}"'|' \
            "${{ env.DEV_FILE }}"

          # Ensure/update digest (add if missing)
          if grep -qE '^\s*digest:' "${{ env.DEV_FILE }}"; then
            sed -i -E \
              -e 's|^([[:space:]]*digest:).*|\1 "'"${{ steps.meta.outputs.DIGEST }}"'"|' \
              "${{ env.DEV_FILE }}"
          else
            awk -v dg="${{ steps.meta.outputs.DIGEST }}" '
              BEGIN{done=0}
              /^image:/{print; print "  digest: \"" dg "\""; done=1; next}
              {print}
              END{if(!done) print "image:\n  digest: \"" dg "\"" }
            ' "${{ env.DEV_FILE }}" > tmp && mv tmp "${{ env.DEV_FILE }}"
          fi

          git add "${{ env.DEV_FILE }}"

          # If nothing changed: skip commit and PR
          if git diff --staged --quiet; then
            echo "NO_CHANGES=true" >> $GITHUB_OUTPUT
            echo "No changes detected; skipping commit and PR."
            exit 0
          fi

          git -c user.name="github-actions[bot]" \
              -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(gitops): DEV -> tag ${{ steps.meta.outputs.TAG }} (pin ${{ steps.meta.outputs.DIGEST }})"
          git push -u origin "$BR"
          echo "NO_CHANGES=false" >> $GITHUB_OUTPUT

      - name: Open pull request
        id: pr
        if: steps.apply.outputs.NO_CHANGES == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          
          # Use exact branch name from apply step
          PR_URL="$(gh pr create \
            --base main \
            --head "${{ steps.apply.outputs.BR }}" \
            --title "chore(gitops): DEV → ${{ steps.meta.outputs.TAG }}" \
            --body  "Update DEV image:\n\n- \`${{ env.DEV_FILE }}\`\n  - tag: \`${{ steps.meta.outputs.TAG }}\`\n  - digest: \`${{ steps.meta.outputs.DIGEST }}\`")"

          echo "PR_URL=$PR_URL" >> "$GITHUB_OUTPUT"
            
      - name: Ensure jq is available
        if: steps.apply.outputs.NO_CHANGES == 'false'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Enable auto-merge for DEV PR
        if: steps.apply.outputs.NO_CHANGES == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          PR_URL="${{ steps.pr.outputs.PR_URL }}"

          if [[ -z "$PR_URL" ]]; then
            echo "ERROR: PR URL is empty"
            exit 1
          fi

          PR_NUMBER="$(gh pr view "$PR_URL" --json number --jq '.number')"

          echo "Waiting for PR #$PR_NUMBER to become eligible for auto-merge..."

          for attempt in {1..12}; do
            echo "Attempt $attempt/12"

            PR_STATE="$(gh pr view "$PR_NUMBER" --json state,isDraft,mergeStateStatus,statusCheckRollup \
              --jq '{state: .state, isDraft: .isDraft, mergeStateStatus: .mergeStateStatus, checks: (.statusCheckRollup // [])}')"

            echo "$PR_STATE"

            STATE="$(echo "$PR_STATE" | jq -r '.state')"
            IS_DRAFT="$(echo "$PR_STATE" | jq -r '.isDraft')"
            MERGE_STATE_STATUS="$(echo "$PR_STATE" | jq -r '.mergeStateStatus')"

            if [[ "$STATE" != "OPEN" ]]; then
              echo "PR is not open anymore"
              exit 1
            fi

            if [[ "$IS_DRAFT" == "true" ]]; then
              echo "PR is still draft, waiting..."
              sleep 10
              continue
            fi

            case "$MERGE_STATE_STATUS" in
              CLEAN|HAS_HOOKS|UNSTABLE)
                echo "PR looks eligible, trying to enable auto-merge..."
                if gh pr merge "$PR_NUMBER" --auto --squash --delete-branch; then
                  echo "Auto-merge enabled successfully"
                  exit 0
                fi
                echo "Auto-merge attempt failed, retrying..."
                ;;
              BLOCKED|BEHIND|DIRTY|DRAFT|UNKNOWN)
                echo "PR not ready yet (mergeStateStatus=$MERGE_STATE_STATUS), waiting..."
                ;;
              *)
                echo "PR still not ready (mergeStateStatus=$MERGE_STATE_STATUS), waiting..."
                ;;
            esac

            sleep 10
          done

          echo "ERROR: Could not enable auto-merge after multiple attempts"
          exit 1