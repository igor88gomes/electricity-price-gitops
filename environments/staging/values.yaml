image:
  repository: ghcr.io/igor88gomes/electricity-price
  tag: ""
  digest: "sha256:a757bf099e533f00775d42d304ce2fb91d3eaefcb3fe465d28f5e92aeee27973"

resources:
  requests: { cpu: 200m, memory: 300Mi }
  limits:   { cpu: 400m, memory: 600Mi }

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
 
probes:
  startup:
    enabled: true

ingress:
  enabled: true
  className: nginx
  annotations: 
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: staging.electricity-price.local
      paths:
        - path: /
          pathType: Prefix
  tls: 
    enabled: true
    secretName: electricity-price-staging-tls

networkPolicy:
  enabled: true

serviceMonitor:
  enabled: true

alerts:
  enabled: true
  env: staging
  targetNamespace: electricity-staging

  errorRateThreshold: 0.02
  latencyP95Seconds: 0.3
  cpuCoresThreshold: 0.30
  upstreamErrorRateThreshold: 0.10

