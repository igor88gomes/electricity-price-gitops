title = "Custom Gitleaks config (minimal)"

# Allow only known GitHub Actions references; real secrets must not be present.
[allowlist]
description = "Ignore GitHub Actions secret references and bot emails; everything else is scanned normally."

# Paths where these patterns are expected (workflows only)
paths = [
  '''\.github/workflows/.*\.ya?ml'''
]

# Common strings that are NOT secrets in this repository
regexes = [
  # GitHub Actions token reference (not a real value)
  '''\$\{\{\s*secrets\.GITHUB_TOKEN\s*\}\}''',
  # Bot noreply email address
  '''github-actions\[bot\]@users\.noreply\.github\.com'''
]